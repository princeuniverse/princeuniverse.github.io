<!DOCTYPE html>
<html>
<head>
    <title>KIOSK</title>
    
    
    <!-- Icons -->
    <link rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

    <!-- Your CSS -->
    <link rel="stylesheet" href="style.css">
    
</head>

<body>

<div class="header">Kiosk Banking Solution</div>
  
    <div class="header">
    <button id="toggleSidebar">☰</button>
</div>
    
<div class="sidebar">

    <div class="menu-item" onclick="loadPage('home', this)">
        <i class="fas fa-house"></i>
        <span>Home</span>
    </div>

    <div class="menu-item" id="transactionBtn">
        <i class="fas fa-exchange-alt"></i>
        <span>Transactions</span>
        <i class="fas fa-chevron-down arrow"></i>
    </div>

    <div class="submenu" id="transactionMenu">

        <div onclick="loadPage('deposit', this)">
            <i class="fas fa-arrow-down"></i>
            <span>Deposit</span>
        </div>

        <div onclick="loadPage('withdrawal', this)">
            <i class="fas fa-arrow-up"></i>
            <span>Withdrawal</span>
        </div>

        <div onclick="loadPage('transfer', this)">
            <i class="fas fa-right-left"></i>
            <span>Fund Transfer</span>
        </div>

    </div>

</div>

<div class="content" id="content"></div>

<script src="js/common.js"></script>
<script src="app.js"></script>
</body>
</html>
