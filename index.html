<!DOCTYPE html>
<html>
<head>
    <title>Prince Universe</title>

    <style>
        body {
            background-color: #0a0f1c;
            color: #00ffcc;
            font-family: Consolas, monospace;
            text-align: center;
        }

        h1 {
            color: #00ffff;
            text-shadow: 0 0 10px #00ffff;
        }

        h2 {
            color: #00ffcc;
            margin-top: 30px;
        }

        p {
            color: #cbd5e1;
            font-size: 18px;
        }

        .box {
            border: 1px solid #00ffcc;
            margin: 20px;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 0 10px #00ffcc;
        }


    
        button {
    background-color: transparent;
    color: #00ffcc;
    border: 2px solid #00ffcc;
    padding: 10px 20px;
    font-size: 16px;
    border-radius: 8px;
    cursor: pointer;
    transition: 0.3s;
}

button:hover {
    background-color: #00ffcc;
    color: black;
    box-shadow: 0 0 15px #00ffcc;
}
        
    </style>

</head>

<body>

    <h1>⚡ Prince Universe ⚡</h1>

    <div class="box">
        <h2>About Me</h2>
        <p>Hello! I'm Prince Arya, learning web development.</p>
    </div>

    <div class="box">
        <h2>Skills</h2>
        <p>HTML (Learning), Visual Basic</p>
    </div>

    <div class="box">
        <h2>Goal</h2>
        <p>To become a professional developer 🚀</p>
    </div>


    <button onclick="showMessage()">Click Me</button>

<p id="message"></p>

<script>
function showMessage() {
    document.getElementById("message").innerHTML = "Welcome to Prince Universe 🚀";
}
</script>
    
</body>
</html>
